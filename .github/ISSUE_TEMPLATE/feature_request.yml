name: ✨ Feature Request
description: 提出一个新功能请求
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ## ✨ 功能描述
        请描述你想要的功能。

  - type: textarea
    id: description
    attributes:
      label: 详细描述
      placeholder: 请详细描述你想要的功能，包括使用场景、解决的问题。
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 解决方案
      placeholder: 你希望如何解决这个问题？有什么具体的建议？
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      placeholder: 你考虑过哪些替代方案？
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: 其他上下文
      placeholder: 还有什么其他信息对理解这个功能请求有帮助？
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: 检查清单
      options:
        - label: 我已经搜索过现有 Issues，确认没有重复的功能请求
          required: true
        - label: 这个功能确实是为了解决一个问题
          required: true
        - label: 我会愿意帮助实现这个功能
          required: false
