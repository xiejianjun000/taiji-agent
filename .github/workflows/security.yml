name: Security Scan

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install bandit safety

      - name: Run Bandit
        run: |
          bandit -r src/ \
            --exclude tests/ \
            --skip B101,B102,B103,B104,B105,B301,B302,B303,B304,B305,B306,B307,B308,B309,B310,B311,B312,B313,B314,B315,B316,B317,B318,B401,B402,B403,B404,B405,B406,B407,B408,B501,B602,B603,B604,B605,B606,B607,B608,B609,B701,B702,B703 \
            -f json -o bandit-report.json || true

      - name: Run Safety
        run: safety check --json --output safety-report.json || true

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json
