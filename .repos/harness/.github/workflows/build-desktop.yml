name: Build Desktop

# CI build — validates desktop builds on pushes and PRs.
# For tagged releases, see release.yml instead.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for the same branch / PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            artifact: harness-desktop-mac
          - os: windows-latest
            platform: win
            artifact: harness-desktop-win
          - os: ubuntu-latest
            platform: linux
            artifact: harness-desktop-linux

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libfuse2

      - name: Install Windows build dependencies
        if: runner.os == 'Windows'
        run: pip install setuptools

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core packages
        run: pnpm --filter @harness/core build

      - name: Build desktop (${{ matrix.platform }})
        run: pnpm --filter @harness/desktop dist:${{ matrix.platform }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          npm_config_msvs_version: "2022"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            packages/desktop/release/*.dmg
            packages/desktop/release/*.zip
            packages/desktop/release/*.exe
            packages/desktop/release/*.AppImage
            packages/desktop/release/*.deb
          if-no-files-found: error
          retention-days: 14
