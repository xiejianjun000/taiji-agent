name: Release

# Unified release workflow — builds desktop installers (Win/Mac/Linux),
# publishes Docker image, and creates a GitHub Release with all artifacts.
#
# Trigger: push a semver tag, e.g.  git tag v0.1.0 && git push --tags
# Manual: workflow_dispatch lets you cut a release from the Actions UI.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false # never cancel a release in progress

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"
  DOCKER_REGISTRY: ghcr.io
  DOCKER_IMAGE: ${{ github.repository }}

# ────────────────────────────────────────────────────────────────────
# Job 1: Build desktop installers (matrix: mac, win, linux)
# ────────────────────────────────────────────────────────────────────
jobs:
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            artifact: harness-desktop-mac
          - os: windows-latest
            platform: win
            artifact: harness-desktop-win
          - os: ubuntu-latest
            platform: linux
            artifact: harness-desktop-linux

    runs-on: ${{ matrix.os }}
    name: Desktop (${{ matrix.platform }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libfuse2

      - name: Install Windows build dependencies
        if: runner.os == 'Windows'
        run: pip install setuptools

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core packages
        run: pnpm --filter @harness/core build

      - name: Build desktop (${{ matrix.platform }})
        run: pnpm --filter @harness/desktop dist:${{ matrix.platform }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          npm_config_msvs_version: "2022"

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            packages/desktop/release/*.dmg
            packages/desktop/release/*.zip
            packages/desktop/release/*.exe
            packages/desktop/release/*.AppImage
            packages/desktop/release/*.deb
          if-no-files-found: error
          retention-days: 30

  # ────────────────────────────────────────────────────────────────
  # Job 2: Build & push Docker image (server mode)
  # ────────────────────────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    name: Docker

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  # ────────────────────────────────────────────────────────────────
  # Job 3: Create GitHub Release with all artifacts
  # ────────────────────────────────────────────────────────────────
  release:
    needs: [desktop, docker]
    runs-on: ubuntu-latest
    name: GitHub Release

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download all desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: harness-desktop-*
          merge-multiple: true

      - name: List release assets
        run: ls -lhR artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Harness ${{ steps.version.outputs.tag }}
          draft: false
          generate_release_notes: true
          files: artifacts/*
          body: |
            ## Install

            ### Desktop App (GUI)

            | Platform | Download |
            |----------|----------|
            | **macOS** (Apple Silicon) | `Harness Desktop-${{ steps.version.outputs.version }}-arm64.dmg` |
            | **macOS** (Intel) | `Harness Desktop-${{ steps.version.outputs.version }}-x64.dmg` |
            | **Windows** (64-bit) | `Harness Desktop-Setup-${{ steps.version.outputs.version }}-x64.exe` |
            | **Linux** (AppImage) | `Harness Desktop-${{ steps.version.outputs.version }}-x64.AppImage` |
            | **Linux** (Debian/Ubuntu) | `Harness Desktop-${{ steps.version.outputs.version }}-x64.deb` |

            ### CLI

            ```bash
            # macOS / Linux
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.sh | sh

            # Windows (PowerShell)
            irm https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.ps1 | iex
            ```

            ### Docker (Server Mode)

            ```bash
            docker pull ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.version }}

            docker run -p 3000:3000 \
              -e ANTHROPIC_API_KEY=sk-ant-... \
              ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.version }}
            ```

            Or with Docker Compose:

            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose.yml -o docker-compose.yml
            ANTHROPIC_API_KEY=sk-ant-... docker compose up
            ```
