apiVersion: v1
kind: ServiceAccount
metadata:
  name: opentaiji
  namespace: opentaiji
  labels:
    app.kubernetes.io/name: opentaiji
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: opentaiji
  namespace: opentaiji
  labels:
    app.kubernetes.io/name: opentaiji
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
    resourceNames: ["opentaiji-secrets"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: opentaiji
  namespace: opentaiji
  labels:
    app.kubernetes.io/name: opentaiji
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: opentaiji
subjects:
  - kind: ServiceAccount
    name: opentaiji
    namespace: opentaiji
