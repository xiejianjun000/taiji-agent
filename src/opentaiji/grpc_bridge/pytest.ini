# Pytest 配置文件

[pytest]
# 测试目录
testpaths = tests

# Python 文件匹配模式
python_files = test_*.py

# 测试类匹配模式
python_classes = Test*

# 测试函数匹配模式
python_functions = test_*

# 标记
markers =
    asyncio: 异步测试
    integration: 集成测试
    slow: 慢速测试
    unit: 单元测试

# 异步模式
asyncio_mode = auto

# 输出选项
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# 日志配置
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 覆盖率
# 暂时禁用覆盖率收集以加快测试
# addopts = --cov=grpc_bridge --cov-report=html --cov-report=term

# 最小 Python 版本
minversion = 3.9
